[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# SPA routing — all paths fall back to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Keep Netlify functions at /.netlify/functions/*
# (this is the default, listed here for clarity)
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true
